<!DOCTYPE html>
<html>
<head>

<title>Invoice Generator</title>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">

<div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow">

<h1 class="text-2xl font-semibold mb-6">Invoice Generator</h1>

<form method="POST">

<div class="grid grid-cols-2 gap-4 mb-6">

<input name="bill_no" placeholder="Bill Number"
class="border rounded-lg p-3">

<input name="client" placeholder="Client Name"
class="border rounded-lg p-3">

<input
type="date"
name="date"
class="border rounded-lg p-3"
title="Leave empty to use today's date">

<input name="due_date" placeholder="Due Date"
class="border rounded-lg p-3">

</div>


<!-- ITEM TABLE -->

<table class="w-full border rounded-lg overflow-hidden">

<thead class="bg-slate-100">

<tr class="text-left">

<th class="p-3">Description</th>
<th class="p-3 w-24">Qty</th>
<th class="p-3 w-32">Price</th>
<th class="p-3 w-32">Amount</th>
<th class="p-3 w-12 text-center"></th>

</tr>

</thead>

<tbody id="items">

<tr>

<td>
<input name="particulars"
placeholder="Description"
class="w-full p-2 border rounded">
</td>

<td>
<input name="qty"
placeholder="Qty"
class="w-full p-2 border rounded qty">
</td>

<td>
<input name="rate"
placeholder="Price"
class="w-full p-2 border rounded price">
</td>

<td class="amount p-2 text-right">₹0</td>

<td class="text-center align-middle w-12">
<button
type="button"
onclick="deleteRow(this)"
class="text-red-500 hover:text-red-700 flex items-center justify-center w-8 h-8">
<i data-lucide="trash-2" class="w-4 h-4"></i>
</button>
</td>

</tr>

</tbody>

</table>


<button type="button"
onclick="addRow()"
class="mt-3 text-blue-600">

+ Add Item

</button>


<!-- TOTAL -->

<div class="text-right mt-6">

<span class="text-lg font-semibold">

Total: ₹<span id="total">0</span>

</span>

</div>


<!-- EXPORT -->

<div class="mt-6 flex gap-4">

<button name="export" value="word"
class="bg-blue-600 text-white px-5 py-2 rounded-lg">

Export Word

</button>

<button name="export" value="pdf"
class="bg-green-600 text-white px-5 py-2 rounded-lg">

Export PDF

</button>

</div>

</form>

</div>


<script>

function addRow(){

const table = document.getElementById("items")

table.insertAdjacentHTML("beforeend",`

<tr>

<td>
<input name="particulars"
placeholder="Description"
class="w-full p-2 border rounded">
</td>

<td>
<input name="qty"
placeholder="Qty"
class="w-full p-2 border rounded qty">
</td>

<td>
<input name="rate"
placeholder="Price"
class="w-full p-2 border rounded price">
</td>

<td class="amount p-2 text-right">₹0</td>

<td class="text-center">
<button
type="button"
onclick="deleteRow(this)"
class="text-red-500 hover:text-red-700 flex items-center justify-center w-8 h-8">
<i data-lucide="trash-2" class="w-4 h-4"></i>
</button>
</td>

</tr>

`)

attachListeners()

}


function deleteRow(btn){

const table = document.getElementById("items")

if(table.rows.length === 1){
return
}

btn.closest("tr").remove()

updateTotal()

}


function attachListeners(){

document.querySelectorAll(".qty, .price").forEach(input => {

input.addEventListener("input", updateRow)

})

}


function updateRow(e){

const row = e.target.closest("tr")

const qty = parseFloat(row.querySelector(".qty")?.value) || 1
const price = parseFloat(row.querySelector(".price")?.value) || 0

const amount = qty * price

row.querySelector(".amount").innerText =
"₹" + amount.toLocaleString()

updateTotal()

}


function updateTotal(){

let total = 0

document.querySelectorAll(".amount").forEach(cell => {

const val = cell.innerText.replace(/[₹,]/g,'')

total += Number(val)

})

document.getElementById("total").innerText =
total.toLocaleString()

}


document.addEventListener("keydown", function(e){

if(e.key !== "Enter") return

const current = document.activeElement

if(current.tagName !== "INPUT") return

e.preventDefault()

const row = current.closest("tr")

const inputs = Array.from(row.querySelectorAll("input"))

const index = inputs.indexOf(current)

if(index < inputs.length - 1){

inputs[index + 1].focus()

}else{

addRow()

setTimeout(()=>{
document.querySelector("#items tr:last-child input").focus()
},50)

}

})


attachListeners()
lucide.createIcons()

</script>

</body>
</html>
